on:
  pull_request:
    paths:
      - 'src/**'
      - '.github/workflows/bc.yml'
      - 'composer.json'
  push:
    branches: ['master']
    paths:
      - 'src/**'
      - '.github/workflows/bc.yml'
      - 'composer.json'

name: backwards compatibility

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  roave_bc_check:
    uses: yiisoft/actions/.github/workflows/bc.yml@master
    with:
      os: >-
        ['ubuntu-latest']
      php: >-
        ['8.4']
      extensions: pdo_oci
